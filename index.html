<!DOCTYPE html>
<html>
<head>

    <title>Do you love me?</title>

            padding: 10px 20px;
            font-size: 20px;

            position: absolute;

            left: 40%;
            top: 50%;
        }
        #noBtn {

    <button id="noBtn">NO 😭</button>

    <script src="script.js"></script>
</body>
</html>
