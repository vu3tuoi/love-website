<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Do you love me?</title>
    <style>
        body {
            text-align: center;
            margin-top: 60px;
            font-family: Arial;
        }
        #noBtn {
            position: absolute;
            left: 50%;
            top: 60%;
            padding: 12px 25px;
            background: red;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.1s;
        }
        #yesBtn {
            padding: 12px 25px;
            background: green;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
        }
        img {
            width: 250px;
        }
    </style>
</head>
<body>

    <h1>Em có yêu anh không?</h1>

    <img src="download.gif" alt="cute gif">

    <br><br>

    <button id="yesBtn">YES</button>
    <button id="noBtn">NO</button>

    <script>
        const noBtn = document.getElementById("noBtn");

        // NÚT NO CHẠY TRỐN
        noBtn.addEventListener("mouseover", () => {
            const x = Math.random() * window.innerWidth * 0.8;
            const y = Math.random() * window.innerHeight * 0.8;
            noBtn.style.left = x + "px";
            noBtn.style.top = y + "px";
        });

        // GỬI DỮ LIỆU VỀ SERVER
        function sendToServer(answer, callback){
            fetch("https://your-server.com/api/answer", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ answer: answer, time: Date.now() })
            }).then(() => {
                if(callback) callback();
            });
        }

        // CLICK YES → GỬI DỮ LIỆU → CHUYỂN TRANG
        document.getElementById("yesBtn").onclick = () => {
            sendToServer("YES", () => {
                window.location.href = "thankyou.html"; // 🔥 chuyển trang
            });
        };

        // CLICK NO → GỬI DỮ LIỆU (không chuyển trang)
        document.getElementById("noBtn").onclick = () => sendToServer("NO");
    </script>

</body>
</html>
