<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Do you love me?</title>
    <style>
        body {
            text-align: center;
            margin-top: 60px;
            font-family: Arial;
        }
        #noBtn {
            position: absolute;
            left: 50%;
            top: 60%;
            padding: 12px 25px;
            background: red;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.1s;
        }
        #yesBtn {
            padding: 12px 25px;
            background: green;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
        }
          img {
            width: 250px;
        }
    </style>
</head>
<body>


    <img src="download.gif" alt="cute gif">
      <h1>Em có yêu anh không?</h1>
    <button id="yesBtn">YES 💖</button>
    <button id="noBtn">NO 😭</button>

    <script src="script.js"></script>
</body>
</html>
